# STARTER M06-01 — sustituye TU_USUARIO/TU_REPO por tu fork
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-demo-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TU_USUARIO/TU_REPO.git
    targetRevision: main
    path: infra/kustomize/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudnative-lab
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
